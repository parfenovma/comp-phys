name: Build Marp Presentations (PDF)

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'slides/**.md'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: generate with marp
        run: |
          npx @marp-team/marp-cli@latest slides/ --pdf --allow-local-files
        env:
          CHROME_PATH: ""
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "false"

      - name: save artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Coursework-Presentations
          path: slides/*.pdf
          retention-days: 30
